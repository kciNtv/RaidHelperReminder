# Raid-time announcements ("invites started" channel posts).
#
# This file has exactly ONE purpose so no mode-detection is needed:
# every run here is announcements mode. The weekly reminder DMs live in
# remind.yml. (Historical note: one combined file routed by matching
# github.event.schedule, but GitHub misattributes which cron fired a run
# after workflow edits, silently running the wrong mode.)
#
# Schedule: raid nights only, explicit 10-minute slots across the hour the
# announcement is due.
#
# WHY NOT "*/15" ANYMORE: GitHub throttles high-frequency schedules hard. The
# old "*/15 0-3,21-23 * * *" declared 28 runs/day but GitHub was actually
# executing 1-2, at arbitrary times hours outside the declared window - so
# between go-live and July 21, 2026 every scheduled run posted 0
# announcements. Fewer, day-scoped slots get honored far more reliably.
#
# WHY THESE DAYS: raids are Tue / Wed / Thu / Sun at 9PM Eastern, but 9PM ET
# is already the NEXT day in UTC - so the UTC cron days are Mon, Wed, Thu,
# Fri (1,3,4,5). Getting this wrong is the classic way to schedule a raid
# announcement exactly 24 hours off.
#
# WHY 00:00-01:59 UTC: 9PM EDT = 01:00 UTC and 9PM EST = 02:00 UTC. With the
# 60-minute lead in config.json (announcements[].minutes_before) the post is
# due 00:00-01:00 UTC in summer and 01:00-02:00 UTC in winter; this window
# covers both, so no DST edit is ever needed. The first run inside the window
# posts and state.json dedup makes every later run that night a no-op.
#
# Cost: 12 slots x 4 raid nights = ~48 runs/week (~210 Actions minutes/month,
# well under the 2,000 free) - down from ~870 under the old schedule.

name: Raid-time announcements

on:
  # schedule: DISABLED 2026-07-23 - all scheduling moved to cron-job.org, which
  # fires this via the workflow_dispatch API below. GitHub's own scheduler
  # dropped runs unpredictably (see the long note above and the July 22-23
  # history), so the external trigger is the single source of timing now.
  # Re-enable by uncommenting the two lines below if cron-job.org ever goes away.
  #   - cron: "0,10,20,30,40,50 0-1 * * 1,3,4,5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print instead of sending)"
        type: boolean
        default: false

permissions:
  contents: write   # allows the workflow to commit state.json back

concurrency:
  group: reminders   # shared with remind.yml - never two runs at once
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run announcements
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          RAIDHELPER_API_KEY: ${{ secrets.RAIDHELPER_API_KEY }}
        run: |
          EXTRA=""
          [ "${{ inputs.dry_run }}" = "true" ] && EXTRA="--dry-run"
          python remind.py --mode announcements $EXTRA

      - name: Save state (so nothing is ever sent twice)
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "reminder-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "Update reminder state"
            git pull --rebase
            git push
          else
            echo "No state changes."
          fi
